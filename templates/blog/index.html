{% extends 'partials/base.html' %}

{% block content %}
<div class="container">
    <div class="row mt-5 pt-5">
        <div class="col-md-4">
            <div class="card my-3 shadow">
                <div class="card-body">
                    <h3>Form</h3>
                  
                </div>

            </div>

        </div>
        <div class="col-md-8">
            {% for post in posts %}
            <div class="card shadow my-3">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <img src="" alt="img">

                        </div>
                        <div class="col-md-8">
                            <small>{{post.date_created}}</small>
                            <hr>
                            <a class="h3" href="">{{post.title}}</a>
                            <p class="my-3" style="text-align: justify">
                                {{post.content}}
                            </p>
                        </div>
                    </div>

                </div>

            </div>
           {% endfor %}
        </div>

    </div>
</div>
{% endblock %}
