{% extends 'partials/base.html' %}
{% block title %}Post Detail Page{% endblock %}
{% load crispy_forms_tags %}
{% block content %}
<div class="container">
    <div class="row mt-5 pt-5">
        <div class="col-md-8 offset-md-2">
            <div class="card my-3 shadow">
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4">
                            <img class="img-thumbnail"  src="{{ post.author.profilemodel.image.url }}" alt="profile-img">
                        </div>
                        <div class="col-md-8">
                            <small>{{post.date_created}}</small>
                            {% if post.author == request.user %}
                            <span><a href="{% url 'blog-post-delete' post.id %}" class="btn btn-danger btn-sm float-end">Delete</a></span>
                            <span><a href="{% url 'blog-post-edit' post.id %}" class="btn btn-primary mx-2 btn-sm float-end">Edit</a></span>
                            {% endif %}
                            <hr>
                            <h4>{{post.title}}</h4>
                            <p>
                                {{post.content}}
                            </p>
                        </div>
                    </div>
                </div>
                

            </div>
        </div>
    </div>
</div>
{% endblock %}
